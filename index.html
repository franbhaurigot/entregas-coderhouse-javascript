<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GameZone Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #0f0f1a;
            color: white;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        .card {
            background-color: #1c1c2e;
            color: white;
            min-height: 320px;
        }
        .card button {
            width: 100%;
        }
    </style>
</head>

<body class="container py-4">

    <!-- HEADER -->
    <header>
        <h1 class="fw-bold">GameZone Store 🎮</h1>
        <p class="text-muted">Equipá tu mundo gamer</p>
    </header>

    <!-- FILTRO -->
    <section class="mb-4">
        <div class="row">
            <div class="col-md-4">
                <label class="form-label">Filtrar por categoría</label>
                <select id="tipoProducto" class="form-select">
                    <option value="0">Todos</option>
                    <option value="Consolas">Consolas</option>
                    <option value="Accesorios">Accesorios</option>
                    <option value="Juegos">Juegos</option>
                </select>
            </div>
        </div>
    </section>

    <!-- PRODUCTOS -->
    <section>
        <h3 class="mb-3">Productos disponibles</h3>
        <div class="row" id="contenedorProductos"></div>
    </section>

    <!-- CARRITO -->
    <section class="mt-5">
        <h3>Carrito Gamer 🛒</h3>

        <ul id="listaCarrito" class="list-group mb-3"></ul>

        <div id="carritoTotal" class="fw-bold fs-5 mb-3">
            Total: $0
        </div>

        <!-- FORMULARIO -->
        <div class="card p-3 shadow-sm">
            <h5>Finalizar compra</h5>
            <form id="formCompraFinal">
                <div class="mb-2">
                    <label class="form-label">Nombre</label>
                    <input required type="text" name="nombre" class="form-control">
                </div>

                <div class="mb-2">
                    <label class="form-label">Email</label>
                    <input required type="email" name="email" class="form-control">
                </div>

                <div class="mb-2">
                    <label class="form-label">Teléfono</label>
                    <input required type="number" name="telefono" class="form-control">
                </div>

                <button type="submit" class="btn btn-success w-100 mt-2">
                    Confirmar compra
                </button>
            </form>
        </div>
    </section>

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->
    <script src="javascript/main.js"></script>

</body>
</html>
